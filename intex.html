<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange - Bielefeld Montpellier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Banner -->
    <header>
        <h1>Exchange</h1>
        <p>Bielefeld Montpellier</p>
    </header>

    <!-- Hauptbereich -->
    <main>
        <h2>Exchange</h2>
        <p class="subtitle">See again</p>

        <!-- Intext Container -->
        <div class="intext-container">
            Every day, every hour, every minute and every second until the German exchange partners arrive in Montpellier
        </div>

        <!-- Kleiner grauer Text -->
        <div class="footer-info">
            Riving at 05.05.2026
        </div>

        <!-- Countdown -->
        <div class="countdown">
            <div id="days">0 Tage</div>
            <div id="hours">0 Stunden</div>
            <div id="minutes">0 Minuten</div>
            <div id="seconds">0 Sekunden</div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        All rights reserved at Mika Schwengebeck #safe
    </footer>

    <!-- Countdown Script -->
    <script>
        const countdownDate = new Date("May 5, 2026 18:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "0 Tage";
                document.getElementById("hours").innerText = "0 Stunden";
                document.getElementById("minutes").innerText = "0 Minuten";
                document.getElementById("seconds").innerText = "0 Sekunden";
                clearInterval(interval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = `${days} Tage`;
            document.getElementById("hours").innerText = `${hours} Stunden`;
            document.getElementById("minutes").innerText = `${minutes} Minuten`;
            document.getElementById("seconds").innerText = `${seconds} Sekunden`;
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
