<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Exchange Countdown</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Banner -->
<div class="banner">
  <div class="banner-title">Deutsch - Französich Exchange</div>
  <div class="banner-subtitle">Bielefeld - Montpellier</div>
</div>

<div class="container">

  <!-- Header -->
  <header class="header">
    <h1>Exchange</h1>
    <h2>See again</h2>
    <hr class="divider">
  </header>

  <!-- Text -->
  <section class="text-section">
    <p>
      Every day, every hour, every minute and every second until the German exchange partners arrive in Montpellier
    </p>
  </section>

  <hr class="divider">

  <!-- Countdown -->
  <section class="countdown-section">
    <div class="countdown-box">
      
      <div class="countdown-item">
        <span id="days">0</span>
        <div class="label">Days</div>
      </div>

      <div class="countdown-item">
        <span id="hours">0</span>
        <div class="label">Hours</div>
      </div>

      <div class="countdown-item">
        <span id="minutes">0</span>
        <div class="label">Minutes</div>
      </div>

      <div class="countdown-item">
        <span id="seconds">0</span>
        <div class="label">Seconds</div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    All rights reserved to @Mika Schwengelbeck
  </footer>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
